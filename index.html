<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RollerCoin Profit Calculator</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rc: {
                            dark: '#0f172a',
                            panel: '#1e293b',
                            accent: '#3b82f6',
                            highlight: '#10b981',
                            text: '#f8fafc',
                            muted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        
        .table-row-hover:hover {
            background-color: rgba(59, 130, 246, 0.05);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Date de start extrase din prompt
        const INITIAL_MINERS = [
            { id: '1', name: 'Pillar Pillagers', power: 5000000, bonus: 2.00, price: 15.74 },
            { id: '2', name: 'Legendary RadEx', power: 5105000, bonus: 2.62, price: 16.27 },
            { id: '3', name: 'Filtration 90', power: 5000000, bonus: 5.00, price: 17.32 },
            { id: '4', name: 'Riding Free', power: 5400000, bonus: 2.40, price: 18.90 },
            { id: '5', name: 'Relic', power: 6930000, bonus: 2.60, price: 19.95 },
            { id: '6', name: 'Tree Invader', power: 6500000, bonus: 3.27, price: 19.95 },
            { id: '7', name: 'BreathTaking', power: 6648000, bonus: 2.43, price: 20.00 },
            { id: '8', name: 'Light Side', power: 5113000, bonus: 5.00, price: 20.05 },
            { id: '9', name: 'Corn Popper', power: 5027000, bonus: 2.18, price: 21.00 },
            { id: '10', name: 'Rare Philosopher\'s', power: 6910000, bonus: 4.00, price: 21.00 }
        ];

        const formatNumber = (num) => {
            return new Intl.NumberFormat('ro-RO', { maximumFractionDigits: 3 }).format(num);
        };

        const calculateMetrics = (miner) => {
            // Power is stored internally in Gh/s
            const powerPh = miner.power / 1000000;
            const powerTh = miner.power / 1000;
            
            const costPerPh = powerPh > 0 ? (miner.price / powerPh) : 0;
            const costPerBonus = miner.bonus > 0 ? (miner.price / miner.bonus) : 0;
            const thPerRlt = miner.price > 0 ? (powerTh / miner.price) : 0;

            return {
                ...miner,
                powerPh,
                costPerPh,
                costPerBonus,
                thPerRlt
            };
        };

        const parseMarketPaste = (text) => {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
            const parsedMiners = [];
            let currentMiner = null;
            let nextMinerInCollection = false; // Flag care reține statusul pentru următorul miner

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Detectare "In collection" - browserul îl pune ÎNAINTEA numelui minerului
                if (line.toLowerCase() === 'in collection') {
                    nextMinerInCollection = true;
                    continue;
                }

                // Căutăm linia cu Putere și Bonus (ex: "578.000 Ph/s | 65%")
                const powerMatch = line.match(/([\d.,]+)\s*(Gh\/s|Th\/s|Ph\/s|Eh\/s)/i);
                
                if (powerMatch) {
                    // Căutăm numele minerului urcând în sus, sărind peste linii irelevante
                    let nameOffset = 1;
                    while(i - nameOffset >= 0 && (
                        lines[i-nameOffset].toLowerCase() === 'in collection' || 
                        lines[i-nameOffset].toLowerCase().startsWith('from') || 
                        lines[i-nameOffset].toLowerCase().startsWith('quantity')
                    )) {
                        nameOffset++;
                    }
                    
                    let name = i - nameOffset >= 0 ? lines[i-nameOffset] : "Miner fără nume " + (parsedMiners.length + 1);

                    // Extragem puterea
                    let power = parseFloat(powerMatch[1].replace(/,/g, ''));
                    let unit = powerMatch[2].toLowerCase();
                    if (unit === 'gh/s') power *= 1;
                    else if (unit === 'th/s') power *= 1000;
                    else if (unit === 'ph/s') power *= 1000000;
                    else if (unit === 'eh/s') power *= 1000000000;

                    // Extragem bonusul
                    let bonus = 0;
                    const bonusMatch = line.match(/\|\s*([\d.,]+)\s*%/);
                    if (bonusMatch) {
                        bonus = parseFloat(bonusMatch[1].replace(/,/g, ''));
                    }

                    currentMiner = {
                        name,
                        power,
                        bonus,
                        price: 0,
                        inCollection: nextMinerInCollection // Aplicăm statusul reținut
                    };
                }

                // Dacă avem un miner în așteptare și găsim linia cu prețul (RLT)
                if (currentMiner && line.toLowerCase().includes('rlt')) {
                    const priceMatch = line.match(/([\d.,]+)\s*rlt/i);
                    if (priceMatch) {
                        currentMiner.price = parseFloat(priceMatch[1].replace(/,/g, ''));
                        
                        if (currentMiner.price > 0) {
                            parsedMiners.push({
                                id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                                ...currentMiner
                            });
                            // După ce a fost atribuit minerului corect, resetăm statusul pentru următorii
                            nextMinerInCollection = false; 
                        }
                        // Resetăm starea pentru a căuta următorul miner din listă
                        currentMiner = null;
                    }
                }
            }

            return parsedMiners;
        };

        const App = () => {
            // State initialization with localStorage persistence
            const [miners, setMiners] = useState(() => {
                const saved = localStorage.getItem('rc_miners');
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        return INITIAL_MINERS;
                    }
                }
                return INITIAL_MINERS;
            });

            // Form state
            const [formData, setFormData] = useState({
                name: '',
                power: '',
                powerUnit: 'Gh/s',
                bonus: '',
                price: '',
                inCollection: false
            });

            const [importText, setImportText] = useState('');
            const [importMessage, setImportMessage] = useState({ text: '', type: '' });

            // Sorting state
            const [sortConfig, setSortConfig] = useState({ key: 'costPerPh', direction: 'asc' });

            const [showClearModal, setShowClearModal] = useState(false);

            // Persist data when changed
            useEffect(() => {
                localStorage.setItem('rc_miners', JSON.stringify(miners));
            }, [miners]);

            const handleInputChange = (e) => {
                const { name, type, checked, value } = e.target;
                setFormData(prev => ({ 
                    ...prev, 
                    [name]: type === 'checkbox' ? checked : value 
                }));
            };

            const handleAddMiner = (e) => {
                e.preventDefault();
                if (!formData.name || !formData.power || !formData.price) return;

                let powerInGhs = parseFloat(formData.power);
                if (formData.powerUnit === 'Th/s') powerInGhs *= 1000;
                if (formData.powerUnit === 'Ph/s') powerInGhs *= 1000000;
                if (formData.powerUnit === 'Eh/s') powerInGhs *= 1000000000;

                const newMiner = {
                    id: Date.now().toString(),
                    name: formData.name.trim(),
                    power: powerInGhs,
                    bonus: parseFloat(formData.bonus) || 0,
                    price: parseFloat(formData.price),
                    inCollection: formData.inCollection
                };

                setMiners(prev => {
                    // Verificăm dacă există deja un miner cu același nume
                    const existingIndex = prev.findIndex(m => m.name.trim().toLowerCase() === newMiner.name.toLowerCase());
                    
                    if (existingIndex !== -1) {
                        // Actualizează minerul existent
                        const updatedList = [...prev];
                        updatedList[existingIndex] = {
                            ...updatedList[existingIndex],
                            power: newMiner.power,
                            bonus: newMiner.bonus,
                            price: newMiner.price,
                            // Păstrează statusul "In Collection" dacă era deja bifat anterior
                            inCollection: newMiner.inCollection || updatedList[existingIndex].inCollection
                        };
                        return updatedList;
                    }
                    // Dacă nu există, îl adăugăm la final
                    return [...prev, newMiner];
                });
                
                // Reset form
                setFormData({
                    name: '',
                    power: '',
                    powerUnit: 'Gh/s',
                    bonus: '',
                    price: '',
                    inCollection: false
                });
            };

            const handleDelete = (id) => {
                setMiners(prev => prev.filter(m => m.id !== id));
            };

            const handleClearAll = () => {
                setMiners([]); // Goleste lista (implicit va sterge si din memoria locala)
                setShowClearModal(false); // Inchide fereastra
            };

            const handleImport = (e) => {
                e.preventDefault();
                if (!importText.trim()) return;
                
                const newMiners = parseMarketPaste(importText);
                if (newMiners.length > 0) {
                    setMiners(prev => {
                        let updatedMiners = [...prev];
                        let addedCount = 0;
                        let updatedCount = 0;

                        newMiners.forEach(newMiner => {
                            // Căutăm dacă minerul importat există deja în lista curentă
                            const existingIndex = updatedMiners.findIndex(
                                m => m.name.trim().toLowerCase() === newMiner.name.trim().toLowerCase()
                            );

                            if (existingIndex !== -1) {
                                // Dacă există, actualizăm datele
                                updatedMiners[existingIndex] = {
                                    ...updatedMiners[existingIndex],
                                    power: newMiner.power,
                                    bonus: newMiner.bonus,
                                    price: newMiner.price,
                                    inCollection: newMiner.inCollection || updatedMiners[existingIndex].inCollection
                                };
                                updatedCount++;
                            } else {
                                // Dacă nu există, adăugăm ca miner nou
                                updatedMiners.push(newMiner);
                                addedCount++;
                            }
                        });

                        // Formăm mesajul pentru utilizator
                        let msgs = [];
                        if (addedCount > 0) msgs.push(`${addedCount} adăugate.`);
                        if (updatedCount > 0) msgs.push(`${updatedCount} actualizate.`);
                        
                        setImportMessage({ text: `Succes: ${msgs.join(' ')}`, type: 'success' });
                        
                        return updatedMiners;
                    });
                    
                    setImportText('');
                } else {
                    setImportMessage({ text: 'Nu s-a putut detecta niciun miner. Asigură-te că ai copiat corect textul.', type: 'error' });
                }
                
                // Ținem mesajul pe ecran un pic mai mult (5 secunde) pentru a putea fi citit
                setTimeout(() => setImportMessage({ text: '', type: '' }), 5000);
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const sortedMiners = useMemo(() => {
                let sortableItems = miners.map(calculateMetrics);
                if (sortConfig !== null) {
                    sortableItems.sort((a, b) => {
                        if (a[sortConfig.key] < b[sortConfig.key]) {
                            return sortConfig.direction === 'asc' ? -1 : 1;
                        }
                        if (a[sortConfig.key] > b[sortConfig.key]) {
                            return sortConfig.direction === 'asc' ? 1 : -1;
                        }
                        return 0;
                    });
                }
                return sortableItems;
            }, [miners, sortConfig]);

            // Helper rendering components
            const SortIcon = ({ columnKey }) => {
                if (sortConfig.key !== columnKey) return <i className="fa-solid fa-sort inline ml-1 opacity-30"></i>;
                return sortConfig.direction === 'asc' 
                    ? <i className="fa-solid fa-sort-up inline ml-1 text-rc-accent"></i>
                    : <i className="fa-solid fa-sort-down inline ml-1 text-rc-accent"></i>;
            };

            const renderStyledName = (name) => {
                const words = name.split(' ');
                const firstWord = words[0].toLowerCase();
                let colorClass = '';

                switch (firstWord) {
                    case 'uncommon': colorClass = 'text-green-400'; break;
                    case 'rare': colorClass = 'text-blue-400'; break;
                    case 'epic': colorClass = 'text-fuchsia-400'; break;
                    case 'legendary': colorClass = 'text-yellow-400'; break;
                    case 'unreal': colorClass = 'text-red-500'; break;
                }

                if (colorClass) {
                    return (
                        <>
                            <span className={colorClass}>{words[0]}</span>{' '}
                            {words.slice(1).join(' ')}
                        </>
                    );
                }
                return name;
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-8">
                        
                        {}
                        <header className="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0 mb-8 border-b border-white/10 pb-6">
                            <div className="flex items-center space-x-3">
                                <i className="fa-solid fa-calculator text-3xl text-rc-accent"></i>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold tracking-tight text-white">RollerCoin Profit Calculator</h1>
                                    <p className="text-rc-muted text-sm mt-1">Analizează minerele și costurile de crafting pentru componente.</p>
                                </div>
                            </div>
                            
                            {/* Butoane Navigatie Tabs */}
                            <div className="flex bg-rc-dark/50 p-1 rounded-lg border border-white/10 w-fit shadow-inner">
                                <button 
                                    onClick={() => setActiveTab('miners')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'miners' ? 'bg-rc-accent text-white shadow' : 'text-rc-muted hover:text-white hover:bg-white/5'}`}
                                >
                                    <i className="fa-solid fa-server mr-2"></i>Minere
                                </button>
                                <button 
                                    onClick={() => setActiveTab('parts')}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'parts' ? 'bg-purple-600 text-white shadow' : 'text-rc-muted hover:text-white hover:bg-white/5'}`}
                                >
                                    <i className="fa-solid fa-hammer mr-2"></i>Crafting Piese
                                </button>
                            </div>
                        </header>

                        {/* --- TABUL 1: MINERE --- */}
                        <div className={`grid grid-cols-1 lg:grid-cols-4 gap-6 animate-[fadeIn_0.3s_ease-out] ${activeTab === 'miners' ? '' : 'hidden'}`}>
                            
                            {}
                            <div className="lg:col-span-1 space-y-4">
                                
                                {/* Formular Manual */}
                                <div className="glass-panel p-6 rounded-xl shadow-xl">
                                    <h2 className="text-lg font-semibold text-white mb-4"><i className="fa-solid fa-pen mr-2"></i>Adăugare Manuală</h2>
                                    <form onSubmit={handleAddMiner} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-medium text-rc-muted mb-1">Nume Miner</label>
                                            <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="input-field w-full rounded-lg px-3 py-2 text-sm" placeholder="ex: El Monstro" required />
                                        </div>
                                        
                                        <div className="flex space-x-2">
                                            <div className="flex-1">
                                                <label className="block text-xs font-medium text-rc-muted mb-1">Putere</label>
                                                <input type="number" step="any" name="power" value={formData.power} onChange={handleInputChange} className="input-field w-full rounded-lg px-3 py-2 text-sm" placeholder="ex: 5.5" required />
                                            </div>
                                            <div className="w-24">
                                                <label className="block text-xs font-medium text-rc-muted mb-1">Unitate</label>
                                                <select name="powerUnit" value={formData.powerUnit} onChange={handleInputChange} className="input-field w-full rounded-lg px-3 py-2 text-sm">
                                                    <option value="Gh/s">Gh/s</option>
                                                    <option value="Th/s">Th/s</option>
                                                    <option value="Ph/s">Ph/s</option>
                                                    <option value="Eh/s">Eh/s</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-medium text-rc-muted mb-1">Bonus (%)</label>
                                            <input type="number" step="any" name="bonus" value={formData.bonus} onChange={handleInputChange} className="input-field w-full rounded-lg px-3 py-2 text-sm" placeholder="ex: 2.5" />
                                        </div>

                                        <div>
                                            <label className="block text-xs font-medium text-rc-muted mb-1">Preț (RLT)</label>
                                            <input type="number" step="any" name="price" value={formData.price} onChange={handleInputChange} className="input-field w-full rounded-lg px-3 py-2 text-sm" placeholder="ex: 15.5" required />
                                        </div>

                                        <label className="flex items-center space-x-2 cursor-pointer pt-1">
                                            <input type="checkbox" name="inCollection" checked={formData.inCollection} onChange={handleInputChange} className="rounded border-white/20 text-rc-accent focus:ring-rc-accent bg-rc-dark/50 w-4 h-4 cursor-pointer" />
                                            <span className="text-xs font-medium text-white/80">Deținut (In Collection)</span>
                                        </label>

                                        <button type="submit" className="w-full bg-rc-accent hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors flex justify-center items-center mt-2">
                                            <i className="fa-solid fa-floppy-disk mr-2"></i>
                                            Salvează
                                        </button>
                                    </form>
                                </div>

                                {/* Formular Import (Afisat permanent) */}
                                <div className="glass-panel p-6 rounded-xl shadow-xl">
                                    <h2 className="text-lg font-semibold text-white mb-4"><i className="fa-solid fa-clipboard mr-2"></i>Importă din Market</h2>
                                    <form onSubmit={handleImport} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-medium text-rc-muted mb-2">
                                                Lipește textul copiat direct din Market:
                                            </label>
                                            <textarea 
                                                value={importText}
                                                onChange={(e) => setImportText(e.target.value)}
                                                className="input-field w-full rounded-lg px-3 py-2 text-xs font-mono h-32 resize-none"
                                                placeholder="Legendary Dreamcatcher&#10;1.188 Eh/s | 33%&#10;Quantity: 2&#10;From&#10;136.5 RLT"
                                                required
                                            />
                                        </div>
                                        <button type="submit" className="w-full bg-rc-highlight hover:bg-green-600 text-white font-medium py-2 px-4 rounded-lg transition-colors flex justify-center items-center mt-2">
                                            <i className="fa-solid fa-file-import mr-2"></i>
                                            Importă Datele
                                        </button>
                                        
                                        {importMessage.text && (
                                            <div className={`p-2 rounded text-xs font-medium text-center mt-2 ${importMessage.type === 'success' ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300'}`}>
                                                {importMessage.text}
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                <div className="glass-panel p-4 rounded-xl text-sm text-rc-muted leading-relaxed">
                                    <p><strong>Sfaturi:</strong></p>
                                    <ul className="list-disc pl-4 mt-2 space-y-1">
                                        <li><span className="text-rc-highlight">Preț / Ph/s</span> mic înseamnă putere brută ieftină.</li>
                                        <li><span className="text-rc-highlight">Preț / 1% Bonus</span> mic este esențial pentru conturile cu putere mare de bază.</li>
                                        <li>Apasă pe capul de tabel pentru a sorta.</li>
                                    </ul>
                                </div>
                            </div>

                            {}
                            <div className="lg:col-span-3">
                                <div className="glass-panel rounded-xl shadow-xl overflow-hidden flex flex-col h-full">
                                    <div className="p-4 border-b border-white/10 flex justify-between items-center bg-rc-panel/30">
                                        <h2 className="text-lg font-semibold text-white"><i className="fa-solid fa-server mr-2"></i>Lista Minere</h2>
                                        {miners.length > 0 && (
                                            <button 
                                                onClick={() => setShowClearModal(true)}
                                                className="text-xs bg-red-500/20 hover:bg-red-500/30 text-red-400 py-1.5 px-3 rounded-lg transition-colors flex items-center border border-red-500/30"
                                            >
                                                <i className="fa-solid fa-trash-can mr-1.5"></i> Șterge Tot
                                            </button>
                                        )}
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-rc-panel/50 text-xs uppercase tracking-wider text-rc-muted border-b border-white/10">
                                                    <th className="p-4 font-medium cursor-pointer hover:text-white" onClick={() => handleSort('name')}>
                                                        Miner <SortIcon columnKey="name" />
                                                    </th>
                                                    <th className="p-4 font-medium cursor-pointer hover:text-white" onClick={() => handleSort('powerPh')}>
                                                        Putere (Ph/s) <SortIcon columnKey="powerPh" />
                                                    </th>
                                                    <th className="p-4 font-medium cursor-pointer hover:text-white" onClick={() => handleSort('bonus')}>
                                                        Bonus % <SortIcon columnKey="bonus" />
                                                    </th>
                                                    <th className="p-4 font-medium cursor-pointer hover:text-white" onClick={() => handleSort('price')}>
                                                        Preț (RLT) <SortIcon columnKey="price" />
                                                    </th>
                                                    <th className="p-4 font-medium cursor-pointer hover:text-rc-highlight text-blue-300" onClick={() => handleSort('costPerPh')}>
                                                        Preț / Ph/s <SortIcon columnKey="costPerPh" />
                                                    </th>
                                                    <th className="p-4 font-medium cursor-pointer hover:text-rc-highlight text-purple-300" onClick={() => handleSort('costPerBonus')}>
                                                        Preț / 1% Bonus <SortIcon columnKey="costPerBonus" />
                                                    </th>
                                                    <th className="p-4 font-medium text-center">Acțiuni</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-sm">
                                                {sortedMiners.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="7" className="p-8 text-center text-rc-muted">
                                                            Niciun miner adăugat. Adaugă unul din formularul alăturat.
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    sortedMiners.map((miner) => (
                                                        <tr key={miner.id} className="table-row-hover transition-colors">
                                                            <td className="p-4 font-medium text-white">
                                                                <div className="flex flex-col items-start gap-1.5">
                                                                    <span className="whitespace-nowrap">{renderStyledName(miner.name)}</span>
                                                                    {miner.inCollection && (
                                                                        <span className="text-[9px] font-bold tracking-wider bg-[#5b528b] text-[#d6cbf5] px-1.5 py-0.5 rounded border border-[#786cae] uppercase shadow-sm">
                                                                            In Collection
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td className="p-4">{formatNumber(miner.powerPh)} Ph/s</td>
                                                            <td className="p-4">{miner.bonus > 0 ? `${formatNumber(miner.bonus)}%` : '-'}</td>
                                                            <td className="p-4 font-semibold text-yellow-400">{formatNumber(miner.price)} <span className="text-xs font-normal">RLT</span></td>
                                                            
                                                            <td className="p-4 font-bold text-blue-400">
                                                                {miner.costPerPh > 0 ? `${formatNumber(miner.costPerPh)} RLT` : 'N/A'}
                                                            </td>
                                                            <td className="p-4 font-bold text-purple-400">
                                                                {miner.costPerBonus > 0 ? `${formatNumber(miner.costPerBonus)} RLT` : 'N/A'}
                                                            </td>
                                                            
                                                            <td className="p-4 text-center">
                                                                <button 
                                                                    onClick={() => handleDelete(miner.id)}
                                                                    className="p-1.5 text-red-400 hover:text-red-300 hover:bg-red-400/10 rounded transition-colors"
                                                                    title="Șterge"
                                                                >
                                                                    <i className="fa-solid fa-trash"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* --- TABUL 2: PIESE (CRAFTING) --- */}
                        <div className={`grid grid-cols-1 lg:grid-cols-4 gap-6 animate-[fadeIn_0.3s_ease-out] ${activeTab === 'parts' ? '' : 'hidden'}`}>
                            
                            {/* Formular Import Piese */}
                            <div className="lg:col-span-1 space-y-4">
                                <div className="glass-panel p-6 rounded-xl shadow-xl border-t-4 border-t-purple-500">
                                    <h2 className="text-lg font-semibold text-white mb-4"><i className="fa-solid fa-gear mr-2 text-purple-400"></i>Setări Crafting</h2>
                                    
                                    <label className="block text-xs font-medium text-rc-muted mb-2">Nivelul Tău de Reducere</label>
                                    <select 
                                        value={craftingLevel} 
                                        onChange={(e) => setCraftingLevel(parseInt(e.target.value))} 
                                        className="input-field w-full rounded-lg px-3 py-2 text-sm mb-4 font-medium"
                                    >
                                        <option value={1}>Nivel 1 (0% Reducere)</option>
                                        <option value={2}>Nivel 2 (5% Reducere)</option>
                                        <option value={3}>Nivel 3 (10% Reducere)</option>
                                        <option value={4}>Nivel 4 (15% Reducere)</option>
                                        <option value={5}>Nivel 5 (25% Reducere)</option>
                                    </select>

                                    <h2 className="text-lg font-semibold text-white mb-4 mt-8"><i className="fa-solid fa-clipboard mr-2 text-purple-400"></i>Importă Prețurile</h2>
                                    <form onSubmit={handlePartsImport} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-medium text-rc-muted mb-2 leading-relaxed">
                                                Selectează piesele în Market, dă Copy, apoi Paste aici (ex: "Legendary Hashboard..."):
                                            </label>
                                            <textarea 
                                                value={partsImportText}
                                                onChange={(e) => setPartsImportText(e.target.value)}
                                                className="input-field w-full rounded-lg px-3 py-2 text-xs font-mono h-32 resize-none"
                                                placeholder="Legendary Hashboard&#10;Quantity: 889&#10;From&#10;11.445 RLT"
                                                required
                                            />
                                        </div>
                                        <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex justify-center items-center mt-2 shadow-lg shadow-purple-900/50">
                                            <i className="fa-solid fa-file-import mr-2"></i>
                                            Actualizează Prețuri
                                        </button>
                                        
                                        {partsImportMsg && (
                                            <div className={`p-2 rounded text-xs font-medium text-center mt-2 ${partsImportMsg.includes('Eroare') ? 'bg-red-500/20 text-red-300' : 'bg-green-500/20 text-green-300'}`}>
                                                {partsImportMsg}
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                <div className="glass-panel p-4 rounded-xl text-xs text-rc-muted leading-relaxed">
                                    <p><strong>De reținut:</strong></p>
                                    <p className="mt-1">Pentru a calcula o piesă (ex: Epic Wire), calculatorul are nevoie de prețul piesei inferioare (Rare Wire) și de prețul actual al piesei Epic pentru a compara dacă ieși pe <span className="text-green-400 font-bold">plus</span>.</p>
                                </div>
                            </div>

                            {/* Tabel Rezultate Crafting */}
                            <div className="lg:col-span-3">
                                <div className="glass-panel rounded-xl shadow-xl overflow-hidden flex flex-col h-full">
                                    <div className="p-4 border-b border-white/10 bg-rc-panel/30">
                                        <h2 className="text-lg font-semibold text-white"><i className="fa-solid fa-code-merge mr-2 text-purple-400"></i>Analiză Detaliată: Cumpără vs. Craftează</h2>
                                    </div>
                                    <div className="overflow-x-auto p-4 space-y-6">
                                        
                                        {['Wire', 'Fan', 'Hashboard'].map(partType => (
                                            <div key={partType} className="border border-white/10 rounded-lg overflow-hidden bg-rc-dark/30">
                                                <div className="bg-gradient-to-r from-rc-panel to-rc-panel/50 px-4 py-3 font-bold text-white border-b border-white/10 flex items-center shadow-md">
                                                    {partType === 'Wire' && <i className="fa-solid fa-plug mr-2.5 text-gray-400"></i>}
                                                    {partType === 'Fan' && <i className="fa-solid fa-fan mr-2.5 text-gray-400"></i>}
                                                    {partType === 'Hashboard' && <i className="fa-solid fa-microchip mr-2.5 text-gray-400"></i>}
                                                    <span className="tracking-wide text-sm">{partType.toUpperCase()}</span>
                                                </div>
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="text-[10px] uppercase tracking-wider text-rc-muted border-b border-white/5 bg-black/40">
                                                            <th className="p-3 font-medium">Țintă (Raritate)</th>
                                                            <th className="p-3 font-medium">Preț Market (Dacă cumperi)</th>
                                                            <th className="p-3 font-medium">Cost Crafting (Piese + Fee)</th>
                                                            <th className="p-3 font-medium text-center">Decizie Optimală</th>
                                                            <th className="p-3 font-medium text-right">Economisești (RLT)</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-white/5 text-sm">
                                                        {['Uncommon', 'Rare', 'Epic', 'Legendary'].map(rarity => {
                                                            const calc = calculateCrafting(partType, rarity);
                                                            return (
                                                                <tr key={rarity} className="hover:bg-white/5 transition-colors">
                                                                    <td className={`p-3 font-bold ${renderPartColor(rarity)}`}>{rarity}</td>
                                                                    <td className="p-3 text-white font-medium">
                                                                        {calc.marketPrice > 0 ? `${formatNumber(calc.marketPrice)} RLT` : <span className="text-rc-muted/40 text-xs font-normal">N/A Market</span>}
                                                                    </td>
                                                                    <td className="p-3">
                                                                        {calc.canCalculate ? (
                                                                            <div className="flex flex-col">
                                                                                <span className="text-white font-medium">{formatNumber(calc.cost)} RLT</span>
                                                                                <span className="text-[10px] text-rc-muted">
                                                                                    {calc.partsNeeded}x {calc.prevRarity} + {formatNumber(calc.baseFee * (1 - getDiscountPercent(craftingLevel)/100))} (Taxă)
                                                                                </span>
                                                                            </div>
                                                                        ) : (
                                                                            <span className="text-rc-muted/40 text-xs font-normal">Lipsă piese {calc.prevRarity}</span>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-3 text-center">
                                                                        {calc.canCalculate ? (
                                                                            calc.isCraftingCheaper ? 
                                                                            <span className="inline-block bg-green-500/20 text-green-400 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider border border-green-500/30 w-[100px] text-center shadow-sm">Craft</span> : 
                                                                            <span className="inline-block bg-red-500/20 text-red-400 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider border border-red-500/30 w-[100px] text-center shadow-sm">Buy Market</span>
                                                                        ) : <span className="text-gray-600">-</span>}
                                                                    </td>
                                                                    <td className="p-3 text-right">
                                                                        {calc.canCalculate ? (
                                                                            <span className={`font-bold ${calc.savings > 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                                                {calc.savings > 0 ? '+' : ''}{formatNumber(calc.savings)} RLT
                                                                            </span>
                                                                        ) : <span className="text-gray-600">-</span>}
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ))}
                                        
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    
                    {/* Fereastra modala de confirmare (Valabilă doar pentru minere) */}
